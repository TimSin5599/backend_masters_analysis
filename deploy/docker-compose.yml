services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: fqw-postgres
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fqw-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - backend

  # Auth Service
  auth-service:
    build:
      context: ../auth-service
    container_name: fqw-auth-service
    restart: always
    environment:
      - APP_NAME=auth-service
      - APP_VERSION=1.0.0
      - HTTP_PORT=8101
      - LOG_LEVEL=info
      - PG_POOL_MAX=10
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOW_ORIGIN=https://masters-admission.ru
    depends_on:
      - db
      - redis
    networks:
      - backend

  # Manage Service
  manage-service:
    build:
      context: ../manage-service
    container_name: fqw-manage-service
    restart: always
    environment:
      - APP_NAME=manage-service
      - APP_VERSION=1.0.0
      - HTTP_PORT=8102
      - LOG_LEVEL=info
      - PG_POOL_MAX=10
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=applicants
      - EXTRACTION_SERVICE_URL=http://extraction-service:8000
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - CORS_ALLOW_ORIGIN=https://masters-admission.ru
    depends_on:
      - db
      - minio
      - minio-init
      - extraction-service
      - rabbitmq
    networks:
      - backend

  # Statistics Service
  statistics-service:
    build:
      context: ../statistics-service
    container_name: fqw-statistics-service
    restart: always
    environment:
      - APP_NAME=statistics-service
      - APP_VERSION=1.0.0
      - HTTP_PORT=8103
      - LOG_LEVEL=info
      - PG_POOL_MAX=10
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - CORS_ALLOW_ORIGIN=https://masters-admission.ru
    depends_on:
      - db
    networks:
      - backend

  # Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fqw-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - backend

  # Object Storage
  minio:
    image: minio/minio
    container_name: fqw-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  # MinIO Init (create buckets)
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}) do
          echo '...waiting for minio...' && sleep 1;
        done;
        /usr/bin/mc mb myminio/applicants || true;
        /usr/bin/mc anonymous set public myminio/applicants;
        exit 0;
      "
    networks:
      - backend

  # Data Extraction Engine (Python)
  extraction-service:
    build:
      context: ../data-extraction-service
    container_name: fqw-extraction-service
    restart: always
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - MODEL_NAME=${OLLAMA_MODEL}
    networks:
      - backend

  # Certbot (SSL certificate management)
  certbot:
    image: certbot/certbot:latest
    container_name: fqw-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Запуск вручную: docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d masters-admission.ru --email timoshasin11@gmail.com --agree-tos --no-eff-email
    # Обновление: docker compose run --rm certbot renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

  # Nginx (API Gateway + Frontend)
  nginx:
    build:
      context: ../..
      dockerfile: backend/deploy/Dockerfile.frontend
    container_name: fqw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - auth-service
      - manage-service
      - statistics-service
      - extraction-service
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_certs:
  certbot_www:
