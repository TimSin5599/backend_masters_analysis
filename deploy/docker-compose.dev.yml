services:
  db:
    image: postgres:15-alpine
    container_name: fqw-dev-postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "${PG_HOST_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: fqw-dev-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fqw-dev-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio
    container_name: fqw-dev-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_PORT}/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        until (/usr/bin/mc alias set myminio http://minio:${MINIO_PORT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}) do
          echo '...waiting for minio...' && sleep 1;
        done;
        /usr/bin/mc mb myminio/applicants || true;
        /usr/bin/mc anonymous set public myminio/applicants;
        exit 0;
      "
    networks:
      - backend

  auth-service:
    build:
      context: ../auth-service
    container_name: fqw-dev-auth-service
    environment:
      - APP_NAME=auth-service
      - APP_VERSION=${APP_VERSION}
      - HTTP_PORT=${AUTH_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - PG_POOL_MAX=${PG_POOL_MAX}
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOW_ORIGIN=http://localhost:3000,https://localhost:3000
      - SWAGGER_HOST=localhost:${AUTH_PORT}
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=${AUTH_PORT}"
      - "prometheus.job=auth-service"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  manage-service:
    build:
      context: ../manage-service
    container_name: fqw-dev-manage-service
    environment:
      - APP_NAME=manage-service
      - APP_VERSION=${APP_VERSION}
      - HTTP_PORT=${MANAGE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - PG_POOL_MAX=${PG_POOL_MAX}
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - MINIO_ENDPOINT=minio:${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=applicants
      - EXTRACTION_SERVICE_URL=http://extraction-service:${EXTRACTION_PORT}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - CORS_ALLOW_ORIGIN=http://localhost:3000,https://localhost:3000
      - SWAGGER_HOST=localhost:${MANAGE_PORT}
    ports:
      - "${MANAGE_PORT}:${MANAGE_PORT}"
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=${MANAGE_PORT}"
      - "prometheus.job=manage-service"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      extraction-service:
        condition: service_started
    networks:
      - backend

  statistics-service:
    build:
      context: ../statistics-service
    container_name: fqw-dev-statistics-service
    environment:
      - APP_NAME=statistics-service
      - APP_VERSION=${APP_VERSION}
      - HTTP_PORT=${STATS_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - PG_POOL_MAX=${PG_POOL_MAX}
      - PG_URL=postgres://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?sslmode=disable
      - JWT_SIGN_KEY=${JWT_SIGN_KEY}
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - SWAGGER_HOST=localhost:${STATS_PORT}
    ports:
      - "${STATS_PORT}:${STATS_PORT}"
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=${STATS_PORT}"
      - "prometheus.job=statistics-service"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  extraction-service:
    build:
      context: ../data-extraction-service
    container_name: fqw-dev-extraction-service
    environment:
      - APP_TITLE=Data Extraction Service
      - APP_DESCRIPTION=Service for extracting structured data from documents using Vision AI models.
      - APP_VERSION=${APP_VERSION}
      - HTTP_PORT=${EXTRACTION_PORT}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - MODEL_NAME=${OLLAMA_MODEL}
    ports:
      - "${EXTRACTION_PORT}:${EXTRACTION_PORT}"
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=${EXTRACTION_PORT}"
      - "prometheus.job=extraction-service"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: fqw-dev-prometheus
    user: root
    volumes:
      - ./prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus_dev_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.2.0
    container_name: fqw-dev-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_dev_data:
  minio_dev_data:
  prometheus_dev_data:
  grafana_dev_data:
