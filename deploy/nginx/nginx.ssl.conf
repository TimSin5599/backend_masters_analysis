server {
    listen 443 ssl;
    http2 on;
    server_name masters-admission.ru;

    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/masters-admission.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masters-admission.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/masters-admission.ru/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Frontend (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Auth Service
    location /api/auth/ {
        set $auth auth-service:8101;
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass http://$auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Manage Service (REST + WebSocket)
    location /api/manage/ {
        set $manage manage-service:8102;
        rewrite ^/api/manage/(.*) /$1 break;
        proxy_pass http://$manage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;

        client_max_body_size 50M;
    }

    # Statistics Service
    location /api/stats/ {
        set $stats statistics-service:8103;
        rewrite ^/api/stats/(.*) /$1 break;
        proxy_pass http://$stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Extraction Service
    location /api/extract/ {
        set $extract extraction-service:8000;
        rewrite ^/api/extract/(.*) /$1 break;
        proxy_pass http://$extract;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_read_timeout 300s;
    }

    # Grafana (доступна только для авторизованных пользователей)
    location /grafana/ {
        set $grafana grafana:3000;
        proxy_pass http://$grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO
    location /minio/ {
        set $minio minio:9000;
        rewrite ^/minio/(.*) /$1 break;
        proxy_pass http://$minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
