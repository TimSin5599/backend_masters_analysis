definitions:
  entity.Applicant:
    properties:
      aggregated_score:
        type: number
      created_at:
        type: string
      evaluation_status:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      patronymic:
        type: string
      program_id:
        type: integer
      score:
        description: Maps to aggregated_score for legacy compatibility
        type: number
      status:
        type: string
      updated_at:
        type: string
    type: object
  entity.Document:
    properties:
      applicant_id:
        type: integer
      file_name:
        type: string
      file_type:
        type: string
      id:
        type: integer
      status:
        type: string
      storage_path:
        type: string
      uploaded_at:
        type: string
    type: object
  entity.DocumentQueueTask:
    properties:
      applicant_id:
        type: integer
      created_at:
        type: string
      document_category:
        type: string
      error_message:
        type: string
      file_path:
        type: string
      id:
        type: string
      priority:
        type: integer
      status:
        type: string
      updated_at:
        type: string
    type: object
  entity.EvaluationCriteria:
    properties:
      code:
        type: string
      max_score:
        type: integer
      title:
        type: string
      type:
        description: BASE, ALTERNATIVE
        type: string
    type: object
  entity.ExpertEvaluation:
    properties:
      applicant_id:
        type: integer
      category:
        type: string
      comment:
        type: string
      created_at:
        type: string
      expert_id:
        type: string
      id:
        type: integer
      is_admin_override:
        type: boolean
      score:
        type: integer
      source_info:
        type: string
      status:
        description: DRAFT, COMPLETED
        type: string
      updated_at:
        type: string
      updated_by_id:
        type: string
    type: object
  entity.ExpertSlot:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      slot_number:
        type: integer
      user_id:
        type: string
    type: object
  entity.Program:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      status:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  entity.User:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      role:
        type: string
    type: object
  handlers.assignSlotRequest:
    properties:
      role:
        type: string
      slot_number:
        type: integer
      user_id:
        type: string
    type: object
  handlers.createApplicantRequest:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      patronymic:
        type: string
      program_id:
        type: integer
    type: object
  handlers.expertEvaluationRequest:
    properties:
      complete:
        type: boolean
      expert_id:
        type: string
      scores:
        items:
          $ref: '#/definitions/entity.ExpertEvaluation'
        type: array
      user_id:
        type: string
      user_name:
        type: string
      user_role:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing applicants and documents
  title: Manage Service API
  version: "1.0"
paths:
  /v1/applicants:
    get:
      description: Возвращает список абитуриентов. Можно фильтровать по ID программы.
      parameters:
      - description: ID образовательной программы для фильтрации
        in: query
        name: program_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.Applicant'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Список абитуриентов
      tags:
      - applicants
    post:
      consumes:
      - application/json
      description: Создаёт нового абитуриента и привязывает его к образовательной
        программе.
      parameters:
      - description: Данные нового абитуриента
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createApplicantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.Applicant'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Создание абитуриента
      tags:
      - applicants
  /v1/applicants/{id}:
    delete:
      description: Удаляет абитуриента и все связанные с ним данные по ID.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удаление абитуриента
      tags:
      - applicants
  /v1/applicants/{id}/criteria:
    get:
      description: Возвращает список всех критериев экспертной оценки. ID абитуриента
        в пути используется для валидации.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.EvaluationCriteria'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Получение критериев оценки
      tags:
      - experts
  /v1/applicants/{id}/data:
    get:
      description: Возвращает структурированные данные абитуриента по указанной категории
        (identification, education, transcript и т.д.).
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория данных
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Данные абитуриента по категории
      tags:
      - applicants
    patch:
      consumes:
      - application/json
      description: Обновляет данные абитуриента по указанной категории. Принимает
        произвольный JSON-объект.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория данных
        in: query
        name: category
        type: string
      - description: Обновлённые данные
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Обновление данных абитуриента
      tags:
      - applicants
  /v1/applicants/{id}/data/{category}/{dataId}:
    delete:
      description: Удаляет конкретную запись данных абитуриента (например, запись
        о работе или достижении) по категории и ID записи.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория данных (work_experience, achievements и т.д.)
        in: path
        name: category
        required: true
        type: string
      - description: ID записи
        in: path
        name: dataId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удаление данных абитуриента
      tags:
      - applicants
  /v1/applicants/{id}/documents:
    get:
      description: Возвращает список всех загруженных документов абитуриента с их
        метаданными и статусами обработки.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.Document'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Список документов абитуриента
      tags:
      - documents
    post:
      consumes:
      - multipart/form-data
      description: Загружает файл документа для абитуриента, сохраняет в MinIO и запускает
        очередь AI-обработки.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория документа
        in: formData
        name: category
        required: true
        type: string
      - description: Тип документа (например, для профессиональной переподготовки)
        in: formData
        name: doc_type
        type: string
      - description: Файл документа (PDF)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Загрузка документа
      tags:
      - documents
  /v1/applicants/{id}/documents/{docId}:
    delete:
      description: Удаляет документ и все связанные с ним извлечённые данные по ID
        абитуриента и ID документа.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: ID документа
        in: path
        name: docId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Удаление документа
      tags:
      - documents
  /v1/applicants/{id}/documents/reprocess:
    post:
      description: Запускает повторное AI-извлечение для последнего загруженного документа
        абитуриента по указанной категории.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория документа
        in: query
        name: category
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Повторная обработка последнего документа
      tags:
      - documents
  /v1/applicants/{id}/documents/view:
    get:
      description: Возвращает содержимое последнего загруженного файла по ID абитуриента
        и категории. Content-Type определяется типом файла.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Категория документа
        in: query
        name: category
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Просмотр последнего документа абитуриента
      tags:
      - documents
  /v1/applicants/{id}/evaluations:
    get:
      description: 'Возвращает список экспертных оценок по абитуриенту. Результат
        фильтруется по роли пользователя: эксперт видит только свои оценки, администратор
        — все.'
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: query
        name: user_id
        type: string
      - description: Роль текущего пользователя
        in: query
        name: user_role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.ExpertEvaluation'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Список оценок экспертов
      tags:
      - experts
    put:
      consumes:
      - application/json
      description: Сохраняет или обновляет оценки эксперта по критериям для указанного
        абитуриента. Завершённую оценку изменить нельзя.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      - description: Данные оценки
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.expertEvaluationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Сохранение экспертной оценки
      tags:
      - experts
  /v1/applicants/{id}/queue-status:
    get:
      description: Возвращает список задач в очереди AI-обработки документов для указанного
        абитуриента.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.DocumentQueueTask'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Статус очереди обработки
      tags:
      - documents
  /v1/applicants/{id}/transfer-to-experts:
    post:
      description: Переводит абитуриента на этап экспертной оценки (изменяет статус
        заявки).
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Передача абитуриента экспертам
      tags:
      - applicants
  /v1/applicants/{id}/transfer-to-operator:
    post:
      description: Переводит абитуриента на этап проверки оператором (изменяет статус
        заявки).
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Передача абитуриента оператору
      tags:
      - applicants
  /v1/applicants/{id}/ws:
    get:
      description: Устанавливает WebSocket-соединение для получения обновлений статуса
        обработки документов абитуриента в реальном времени.
      parameters:
      - description: ID абитуриента
        in: path
        name: id
        required: true
        type: integer
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: WebSocket соединение
      tags:
      - applicants
  /v1/documents/{id}/category:
    patch:
      description: Меняет категорию документа на новую и запускает его повторную обработку.
      parameters:
      - description: ID документа
        in: path
        name: id
        required: true
        type: integer
      - description: 'Новая категория: { \'
        in: body
        name: category
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Изменение категории документа
      tags:
      - documents
  /v1/documents/{id}/reprocess:
    post:
      description: Запускает повторное AI-извлечение для конкретного документа по
        его ID.
      parameters:
      - description: ID документа
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Повторная обработка документа по ID
      tags:
      - documents
  /v1/documents/{id}/status:
    get:
      description: Возвращает текущий статус обработки документа по его ID.
      parameters:
      - description: ID документа
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Статус документа
      tags:
      - documents
  /v1/documents/{id}/view:
    get:
      description: Возвращает содержимое файла документа напрямую (inline) по ID документа.
        Content-Type определяется типом файла.
      parameters:
      - description: ID документа
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Просмотр документа по ID
      tags:
      - documents
  /v1/experts:
    get:
      description: Возвращает список всех пользователей с ролью эксперта.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
