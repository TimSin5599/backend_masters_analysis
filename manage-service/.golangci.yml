version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam

  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1020"
        - "-ST1021"
        - "-QF1001"
        - "-QF1003"
        - "-QF1008"

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - unparam
    # RabbitMQ, WebSocket, SSE, инфраструктурные клиенты — errcheck отключён глобально
    # (Close/Ack/Nack/fmt.Fprint в этих пакетах объективно необрабатываемы)
    paths:
      - internal/rabbitmq
      - internal/websocket
      - internal/sse
      - internal/infrastructure

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - manage-service
