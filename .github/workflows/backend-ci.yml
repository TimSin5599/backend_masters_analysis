name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4' # Укажите вашу точную версию Go

      # Генерация Swagger docs (файлы в .gitignore, но нужны для typecheck)
      - name: Generate Swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          cd auth-service       && swag init -g cmd/app/main.go --quiet && cd ..
          cd manage-service     && swag init -g cmd/app/main.go --quiet && cd ..
          cd statistics-service && swag init -g cmd/app/main.go --quiet && cd ..

      # Линтер для Go
      - name: Run GolangCI-Lint (Auth)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: auth-service

      - name: Run GolangCI-Lint (Manage)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: manage-service

      - name: Run GolangCI-Lint (Statistics)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
          working-directory: statistics-service

      # Тесты для Go
      - name: Run Go Tests
        run: |
          cd auth-service && go test -v ./...
          cd ../manage-service && go test -v ./...
          cd ../statistics-service && go test -v ./...

      # Линтер для Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Flake8
        run: |
          cd data-extraction-service
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' # Деплоим только при пуше в main
    runs-on: ubuntu-latest
    environment: production
    # Секреты задаются в GitHub → Settings → Environments → production → Environment secrets:
    #   HOST     — IP или hostname продакшн-сервера
    #   USERNAME — SSH-пользователь на сервере
    #   SSH_KEY  — приватный SSH-ключ (RSA / Ed25519)
    #   ENV_FILE — содержимое deploy/.env (скопируйте .env.example и заполните)
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: ENV_FILE
          script: |
            cd /opt/FQW/backend

            # 1. Обновляем код
            git pull origin main

            # 2. Восстанавливаем .env (единый источник конфигурации)
            echo "$ENV_FILE" > deploy/.env

            # 3. Применяем новые миграции из папок migrations/ каждого сервиса
            chmod +x deploy/migrate.sh
            bash deploy/migrate.sh

            # 4. Пересобираем и перезапускаем сервисы
            cd deploy
            docker compose up -d --build
