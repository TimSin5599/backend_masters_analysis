basePath: /
definitions:
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
host: localhost:8081
info:
  contact: {}
  description: Authentication service
  title: Auth Service API
  version: "1.0"
paths:
  /v1/auth/change-password:
    post:
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: Сменить пароль
      tags:
      - auth
  /v1/auth/me:
    get:
      description: Получение информации о текущем авторизованном пользователе
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Текущий пользователь
      tags:
      - auth
  /v1/login:
    post:
      consumes:
      - application/json
      description: Вход в систему. Возвращает access_token в JSON и устанавливает
        refresh_token в httpOnly cookie.
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Авторизация
      tags:
      - auth
  /v1/logout:
    post:
      description: Инвалидирует refresh токен и очищает cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Выход
      tags:
      - auth
  /v1/refresh:
    post:
      description: Обновляет access токен по refresh токену из httpOnly cookie. Реализует
        ротацию refresh токена.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Обновить токены
      tags:
      - auth
  /v1/users:
    get:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Список пользователей
      tags:
      - users
    post:
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать пользователя
      tags:
      - users
  /v1/users/{id}:
    delete:
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: Удаление пользователя
      tags:
      - auth
    get:
      description: Получение информации о пользователе по его ID
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Пользователь по ID
      tags:
      - users
    put:
      responses: {}
      security:
      - ApiKeyAuth: []
      summary: Обновить пользователя
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Введи токен в формате: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
